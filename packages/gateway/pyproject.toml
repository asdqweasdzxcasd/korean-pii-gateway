[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "korean-pii-gateway"
version = "0.1.0"
description = "한국어 PII 차단 OpenAI 호환 LLM 프록시 게이트웨이"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
authors = [{ name = "asdqweasdzxcasd" }]
keywords = ["pii", "korean", "privacy", "llm", "proxy", "gateway"]
classifiers = [
  "Development Status :: 4 - Beta",
  "Intended Audience :: Developers",
  "Natural Language :: Korean",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Topic :: Security",
]
dependencies = ["korean-pii>=0.1.0", "fastapi>=0.110", "httpx>=0.27", "uvicorn>=0.29"]

[project.urls]
Repository = "https://github.com/asdqweasdzxcasd/korean-pii-gateway"

[tool.hatch.build.targets.wheel]
packages = ["src/korean_pii_gateway"]

[tool.hatch.metadata]
allow-direct-references = true
